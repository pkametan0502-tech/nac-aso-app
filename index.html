<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NAC ASO System V15</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

  <!-- jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    :root {
      --bg: #06122b;
      --bg2: #091833;
      --card: #08152d;
      --line: #28466f;
      --text: #ffffff;
      --muted: #a7b8d6;
      --green: #10b981;
      --blue: #2563eb;
      --red: #dc2626;
      --amber: #f59e0b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, var(--bg), #021020);
      color: var(--text);
    }

    .topbar {
      background: #020b1f;
      color: var(--text);
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
    }

    .container {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
    }

    h1, h2, h3 {
      margin-top: 0;
    }

    p {
      color: var(--muted);
      line-height: 1.5;
    }

    button {
      background: var(--blue);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      opacity: 0.92;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 10px 12px;
      margin-top: 6px;
      margin-bottom: 14px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #0b1d3a;
      color: white;
    }

    label {
      display: block;
      font-weight: bold;
      margin-top: 10px;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>NAC ASO System V15</h1>
  </div>

  <div class="container">
    <div class="card">
      <h2>System Loading</h2>
      <p>Your HTML head and base styling are now cleaned up. Paste the rest of your code so I can sort the full app properly.</p>
    </div>
  </div>
</body>
</html>

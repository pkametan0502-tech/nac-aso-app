<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAC ASO System V7</title>

<style>
body { font-family: Arial; margin:0; background:#eef3f8; }
.topbar {
  background: linear-gradient(rgba(0,43,82,0.9), rgba(0,95,163,0.85)),
  url('https://images.unsplash.com/photo-1504196606672-aef5c9cefc92');
  background-size: cover;
  color:white;
  padding:20px;
  text-align:center;
}
.container { padding:15px; }
.card {
  background:white;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
}
input, select, textarea { width:100%; padding:8px; margin:5px 0; }
button { padding:10px; background:#005fa3; color:white; border:none; border-radius:5px; }
.hidden { display:none; }
</style>
</head>

<body>

<div class="topbar">
<h2>NAC ASO SYSTEM - PMIA</h2>
<p>Airport Safety Operations System</p>
</div>

<div class="container">

<!-- LOGIN -->
<div id="authSection" class="card">
<h3>Login</h3>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="signup()">Create Account</button>
</div>

<!-- APP -->
<div id="appSection" class="hidden">

<div class="card">
<button onclick="logout()">Logout</button>
</div>

<div class="card">
<h3>ASO Live Log Entry</h3>

<input type="text" id="asoName" placeholder="ASO Name">

<select id="shift">
<option>A Shift (0300–1100)</option>
<option>B Shift (1200–2000)</option>
<option>C Shift (0800–1700)</option>
</select>

<select id="reportType">
<option>Daily Patrol</option>
<option>Bird Strike</option>
<option>Incident</option>
<option>Emergency</option>
</select>

<textarea id="details" placeholder="Enter log details"></textarea>

<input type="time" id="time">

<!-- IMAGE -->
<label>Photo (Optional)</label>
<input type="file" id="photoInput" accept="image/*" capture="environment">

<!-- LOCATION -->
<button onclick="getLocation()">Capture Location</button>
<p id="locationDisplay">No location</p>
<input type="hidden" id="lat">
<input type="hidden" id="lng">

<br><br>
<button onclick="submitLog()">Submit Log</button>
</div>

<div class="card">
<h3>Logs</h3>
<div id="logList"></div>
</div>

</div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js';
import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js';

const firebaseConfig = {
apiKey: "AIzaSyA24K2cPg0OR6DZRSxwJBy7TQKIoE7dGAc",
authDomain: "nac-aso-system.firebaseapp.com",
projectId: "nac-aso-system",
storageBucket: "nac-aso-system.firebasestorage.app",
messagingSenderId: "852433876255",
appId: "1:852433876255:web:c59a0a757ee4f7466dac2a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.login = async () => {
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;
await signInWithEmailAndPassword(auth,email,password);
};

window.signup = async () => {
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;
await createUserWithEmailAndPassword(auth,email,password);
};

window.logout = async () => {
await signOut(auth);
};

onAuthStateChanged(auth,user=>{
if(user){
document.getElementById("authSection").classList.add("hidden");
document.getElementById("appSection").classList.remove("hidden");
loadLogs();
}else{
document.getElementById("authSection").classList.remove("hidden");
document.getElementById("appSection").classList.add("hidden");
}
});

window.getLocation = () => {
navigator.geolocation.getCurrentPosition(pos=>{
const lat = pos.coords.latitude;
const lng = pos.coords.longitude;
document.getElementById("lat").value = lat;
document.getElementById("lng").value = lng;
document.getElementById("locationDisplay").innerText = `Lat:${lat}, Lng:${lng}`;
});
};

window.submitLog = async () => {

const file = document.getElementById("photoInput").files[0];
let imageURL = file ? URL.createObjectURL(file) : "";

await addDoc(collection(db,"logs"),{
name: document.getElementById("asoName").value,
shift: document.getElementById("shift").value,
type: document.getElementById("reportType").value,
details: document.getElementById("details").value,
time: document.getElementById("time").value,
imageURL,
lat: document.getElementById("lat").value,
lng: document.getElementById("lng").value,
created: serverTimestamp()
});

alert("Saved");
};

function loadLogs(){
onSnapshot(collection(db,"logs"),snap=>{
let html="";
snap.forEach(doc=>{
const d = doc.data();
html += `
<div style="border-bottom:1px solid #ccc; padding:10px;">
<b>${d.time}</b> - ${d.type}<br>
${d.details}<br>
${d.imageURL ? `<img src="${d.imageURL}" style="width:100%;">` : ""}
${d.lat ? `<br>📍 ${d.lat}, ${d.lng}` : ""}
</div>`;
});
document.getElementById("logList").innerHTML = html;
});
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAC ASO System</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#06122b;
  color:white;
}
.topbar {
  background:#020b1f;
  padding:15px;
  font-size:20px;
}
.container {
  display:flex;
  gap:20px;
  padding:20px;
}
.card {
  flex:1;
  background:#08152d;
  padding:20px;
  border-radius:10px;
}
input, select {
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:6px;
  border:none;
}
button {
  background:#2563eb;
  color:white;
  padding:10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
.error { background:#7f1d1d; padding:10px; margin-bottom:10px;}
.success { background:#065f46; padding:10px; margin-bottom:10px;}
.hidden { display:none; }
</style>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA24K2cPg00R6DZRSxwJBy7TQKIoE7dGAc",
  authDomain: "nac-aso-system.firebaseapp.com",
  projectId: "nac-aso-system",
  storageBucket: "nac-aso-system.appspot.com",
  messagingSenderId: "852433876255",
  appId: "1:852433876255:web:c59a0a757ee4f7466dac2a"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

function showMessage(type,msg){
  const box = document.getElementById("msg");
  box.className = type;
  box.innerHTML = msg;
}

function login(){
  const email = document.getElementById("loginEmail").value;
  const pass = document.getElementById("loginPass").value;

  auth.signInWithEmailAndPassword(email, pass)
  .then(()=>{})
  .catch(err=>showMessage("error", err.message));
}

function register(){
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;
  const role = document.getElementById("role").value;
  const airport = document.getElementById("airport").value;

  auth.createUserWithEmailAndPassword(email, pass)
  .then(user=>{
    return db.collection("users").doc(user.user.uid).set({
      name, email, role, airport
    });
  })
  .then(()=>showMessage("success","Account created"))
  .catch(err=>showMessage("error", err.message));
}

function logout(){
  auth.signOut();
}

auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById("auth").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");
    loadUser(user.uid);
  } else {
    document.getElementById("auth").classList.remove("hidden");
    document.getElementById("dashboard").classList.add("hidden");
  }
});

function loadUser(uid){
  db.collection("users").doc(uid).get().then(doc=>{
    if(doc.exists){
      const d = doc.data();
      document.getElementById("userInfo").innerHTML =
        d.name + " | " + d.role + " | " + d.airport;
    }
  });
}
</script>
</head>

<body>

<div class="topbar">NAC ASO System</div>

<div id="auth" class="container">
  <div class="card">
    <h2>Login</h2>
    <div id="msg"></div>
    <input id="loginEmail" placeholder="Email">
    <input id="loginPass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>

  <div class="card">
    <h2>Create Account</h2>
    <input id="name" placeholder="Full Name">
    <input id="email" placeholder="Email">
    <input id="pass" type="password" placeholder="Password">

    <select id="role">
      <option>Airport Safety Officer (ASO)</option>
      <option>Senior Airport Safety Officer (SASO)</option>
      <option>Airport Operations Manager (AOM)</option>
    </select>

    <input id="airport" value="PMIA">

    <button onclick="register()">Create Account</button>
  </div>
</div>

<div id="dashboard" class="container hidden">
  <div class="card">
    <h2>Dashboard</h2>
    <p id="userInfo"></p>
    <button onclick="logout()">Logout</button>
  </div>
</div>

</body>
</html>

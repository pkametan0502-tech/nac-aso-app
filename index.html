<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAC ASO System</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f3f6fb;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 15px;
}

input, button {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
}

button {
  background: #002b52;
  color: white;
  border: none;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<div class="container">

<h2>NAC ASO System</h2>

<!-- LOGIN -->
<div id="authSection" class="card">
  <h3>Login</h3>

  <input type="email" id="loginEmail" placeholder="Email">
  
  <input type="password" id="loginPassword" placeholder="Password">

  <label>
    <input type="checkbox" id="showLoginPassword">
    Show Password
  </label>

  <button id="loginBtn">Login</button>

  <hr>

  <h3>Signup</h3>

  <input type="text" id="signupName" placeholder="Full Name">
  <input type="email" id="signupEmail" placeholder="Email">
  <input type="password" id="signupPassword" placeholder="Password">

  <label>
    <input type="checkbox" id="showSignupPassword">
    Show Password
  </label>

  <button id="signupBtn">Create Account</button>
</div>

<!-- APP -->
<div id="appSection" class="card hidden">
  <h3>Dashboard</h3>

  <button id="logoutBtn">Logout</button>

  <hr>

  <h4>Submit Report</h4>

  <input type="text" id="reportTitle" placeholder="Report Title">
  <textarea id="reportDetails" placeholder="Details"></textarea>

  <button id="submitReportBtn">Submit Report</button>

  <hr>

  <h4>Reports</h4>
  <div id="reportsList"></div>

</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { getFirestore, collection, addDoc, getDocs }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA24K2cPg0OR6DZRSxwJBy7TQKIoE7dGAc",
  authDomain: "nac-aso-system.firebaseapp.com",
  projectId: "nac-aso-system",
  storageBucket: "nac-aso-system.appspot.com",
  messagingSenderId: "852433876255",
  appId: "1:852433876255:web:c59a0a757ee4f7466dac2a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const authSection = document.getElementById("authSection");
const appSection = document.getElementById("appSection");


// ✅ SHOW PASSWORD TOGGLE
document.getElementById("showLoginPassword").addEventListener("change", function () {
  document.getElementById("loginPassword").type = this.checked ? "text" : "password";
});

document.getElementById("showSignupPassword").addEventListener("change", function () {
  document.getElementById("signupPassword").type = this.checked ? "text" : "password";
});


// LOGIN
document.getElementById("loginBtn").addEventListener("click", async () => {
  const email = loginEmail.value;
  const password = loginPassword.value;

  try {
    await signInWithEmailAndPassword(auth, email, password);
    alert("Login success");
  } catch (e) {
    alert(e.message);
  }
});

// SIGNUP
document.getElementById("signupBtn").addEventListener("click", async () => {
  try {
    await createUserWithEmailAndPassword(auth, signupEmail.value, signupPassword.value);
    alert("Account created");
  } catch (e) {
    alert(e.message);
  }
});

// LOGOUT
document.getElementById("logoutBtn").addEventListener("click", async () => {
  await signOut(auth);
});

// AUTH STATE
onAuthStateChanged(auth, (user) => {
  if (user) {
    authSection.classList.add("hidden");
    appSection.classList.remove("hidden");
    loadReports();
  } else {
    authSection.classList.remove("hidden");
    appSection.classList.add("hidden");
  }
});

// SUBMIT REPORT
document.getElementById("submitReportBtn").addEventListener("click", async () => {
  await addDoc(collection(db, "reports"), {
    title: reportTitle.value,
    details: reportDetails.value,
    time: new Date()
  });

  reportTitle.value = "";
  reportDetails.value = "";

  loadReports();
});

// LOAD REPORTS
async function loadReports() {
  const list = document.getElementById("reportsList");
  list.innerHTML = "";

  const querySnapshot = await getDocs(collection(db, "reports"));

  querySnapshot.forEach((doc) => {
    const data = doc.data();

    const div = document.createElement("div");
    div.innerHTML = `<b>${data.title}</b><br>${data.details}<hr>`;
    list.appendChild(div);
  });
}

</script>

</body>
</html>

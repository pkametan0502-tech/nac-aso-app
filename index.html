<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NAC ASO System</title>

  <!-- Firebase Compat SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    :root{
      --bg:#05152d;
      --card:#081a35;
      --line:#234d80;
      --text:#f8fbff;
      --muted:#9fb7d5;
      --blue:#2563eb;
      --green:#10b981;
      --red:#dc2626;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial,Helvetica,sans-serif;
      background:linear-gradient(135deg,#05152d,#031125 60%,#082042);
      color:var(--text);
      min-height:100vh;
    }

    .topbar{
      padding:16px 20px;
      background:#020b1f;
      border-bottom:1px solid var(--line);
      font-size:28px;
      font-weight:700;
    }

    .container{
      max-width:1200px;
      margin:0 auto;
      padding:20px;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:14px;
      padding:20px;
      box-shadow:0 8px 24px rgba(0,0,0,0.25);
    }

    h2,h3{
      margin-top:0;
    }

    label{
      display:block;
      font-weight:700;
      margin:10px 0 6px;
    }

    input,select,textarea{
      width:100%;
      padding:12px;
      border:1px solid var(--line);
      border-radius:10px;
      background:#0b2143;
      color:var(--text);
      margin-bottom:12px;
      outline:none;
    }

    input:focus,select:focus,textarea:focus{
      border-color:#60a5fa;
    }

    button{
      border:none;
      border-radius:10px;
      padding:11px 15px;
      font-weight:700;
      cursor:pointer;
      color:#fff;
      background:var(--blue);
    }

    button:hover{
      opacity:.95;
    }

    .btn-green{background:var(--green)}
    .btn-red{background:var(--red)}

    .hidden{display:none !important}

    .message{
      margin-bottom:16px;
      padding:12px 14px;
      border-radius:10px;
      display:none;
      font-weight:700;
    }

    .message.show{display:block}
    .message.error{background:#7f1d1d}
    .message.success{background:#065f46}

    .stats{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:16px;
      margin-bottom:20px;
    }

    .stat{
      background:#0b2143;
      border:1px solid var(--line);
      border-radius:12px;
      padding:16px;
    }

    .stat .label{
      color:var(--muted);
      font-size:13px;
      margin-bottom:8px;
    }

    .stat .value{
      font-size:24px;
      font-weight:800;
    }

    .small{
      color:var(--muted);
      font-size:13px;
    }

    @media (max-width:900px){
      .grid,.stats{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">NAC ASO System</div>

  <div class="container">
    <div id="messageBox" class="message"></div>

    <!-- AUTH VIEW -->
    <div id="authView" class="grid">
      <div class="card">
        <h2>Login</h2>
        <p class="small">Sign in using your registered Firebase account.</p>

        <label for="loginEmail">Email</label>
        <input id="loginEmail" type="email" placeholder="Email" />

        <label for="loginPassword">Password</label>
        <input id="loginPassword" type="password" placeholder="Password" />

        <button onclick="loginUser()">Login</button>
      </div>

      <div class="card">
        <h2>Create Account</h2>
        <p class="small">Create a new NAC ASO user account.</p>

        <label for="registerName">Full Name</label>
        <input id="registerName" type="text" placeholder="Full name" />

        <label for="registerEmail">Email</label>
        <input id="registerEmail" type="email" placeholder="Email" />

        <label for="registerPassword">Password</label>
        <input id="registerPassword" type="password" placeholder="Password" />

        <label for="registerRole">Role</label>
        <select id="registerRole">
          <option>Airport Operations Manager (AOM)</option>
          <option>Senior Airport Safety Officer (SASO)</option>
          <option selected>Airport Safety Officer (ASO)</option>
          <option>Team Leader Grounds Staff</option>
          <option>Grounds Staff</option>
          <option>Chief Operations Officer</option>
          <option>Wild Life Manager</option>
          <option>Wildlife Officer</option>
        </select>

        <label for="registerAirport">Primary Airport</label>
        <input id="registerAirport" type="text" value="PMIA" />

        <button class="btn-green" onclick="registerUser()">Create Account</button>
      </div>
    </div>

    <!-- APP VIEW -->
    <div id="appView" class="hidden">
      <div class="stats">
        <div class="stat">
          <div class="label">User</div>
          <div class="value" id="statUser">-</div>
        </div>
        <div class="stat">
          <div class="label">Role</div>
          <div class="value" id="statRole">-</div>
        </div>
        <div class="stat">
          <div class="label">Airport</div>
          <div class="value" id="statAirport">-</div>
        </div>
        <div class="stat">
          <div class="label">Status</div>
          <div class="value">Online</div>
        </div>
      </div>

      <div class="card">
        <h2>Dashboard</h2>
        <p>You are logged in successfully.</p>
        <button class="btn-red" onclick="logoutUser()">Logout</button>
      </div>
    </div>
  </div>

  <script>
    // Exact Firebase config for your NAC ASO System project
    const firebaseConfig = {
      apiKey: "AIzaSyA24K2cPg00R6DZRSxwJBy7TQKIoE7dGAc",
      authDomain: "nac-aso-system.firebaseapp.com",
      projectId: "nac-aso-system",
      storageBucket: "nac-aso-system.appspot.com",
      messagingSenderId: "852433876255",
      appId: "1:852433876255:web:c59a0a757ee4f7466dac2a"
    };

    // Prevent duplicate initialization
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }

    const auth = firebase.auth();
    const db = firebase.firestore();

    const messageBox = document.getElementById("messageBox");
    const authView = document.getElementById("authView");
    const appView = document.getElementById("appView");

    function showMessage(type, text) {
      messageBox.className = "message show " + type;
      messageBox.textContent = text;
    }

    function clearMessage() {
      messageBox.className = "message";
      messageBox.textContent = "";
    }

    async function registerUser() {
      clearMessage();

      const fullName = document.getElementById("registerName").value.trim();
      const email = document.getElementById("registerEmail").value.trim();
      const password = document.getElementById("registerPassword").value;
      const role = document.getElementById("registerRole").value;
      const airport = document.getElementById("registerAirport").value.trim();

      if (!fullName || !email || !password || !airport) {
        showMessage("error", "Complete all registration fields.");
        return;
      }

      try {
        const cred = await auth.createUserWithEmailAndPassword(email, password);

        await db.collection("users").doc(cred.user.uid).set({
          fullName,
          email,
          role,
          airport,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        showMessage("success", "Account created successfully.");
      } catch (error) {
        showMessage("error", error.message);
      }
    }

    async function loginUser() {
      clearMessage();

      const email = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value;

      if (!email || !password) {
        showMessage("error", "Enter email and password.");
        return;
      }

      try {
        await auth.signInWithEmailAndPassword(email, password);
      } catch (error) {
        showMessage("error", error.message);
      }
    }

    async function logoutUser() {
      try {
        await auth.signOut();
        showMessage("success", "Logged out.");
      } catch (error) {
        showMessage("error", error.message);
      }
    }

    async function loadProfile(uid) {
      try {
        const doc = await db.collection("users").doc(uid).get();

        if (!doc.exists) {
          document.getElementById("statUser").textContent = "No profile";
          document.getElementById("statRole").textContent = "-";
          document.getElementById("statAirport").textContent = "-";
          return;
        }

        const data = doc.data();
        document.getElementById("statUser").textContent = data.fullName || "-";
        document.getElementById("statRole").textContent = data.role || "-";
        document.getElementById("statAirport").textContent = data.airport || "-";
      } catch (error) {
        showMessage("error", "Profile load failed: " + error.message);
      }
    }

    auth.onAuthStateChanged(async (user) => {
      clearMessage();

      if (user) {
        authView.classList.add("hidden");
        appView.classList.remove("hidden");
        await loadProfile(user.uid);
      } else {
        authView.classList.remove("hidden");
        appView.classList.add("hidden");
      }
    });

    console.log("Firebase initialized correctly for NAC ASO System.");
  </script>
</body>
</html>
